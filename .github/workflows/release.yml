name: Release

on:
  push:
    tags:
      - '*' # Run on any tag push

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required by GoReleaser to generate changelog

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update README with new version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -b main origin/main
          git pull origin main
          sed -i -E "s/download\/v[0-9a-zA-Z.-]+\/lazygcs_[0-9a-zA-Z.-]+_linux_amd64\.deb/download\/v${VERSION}\/lazygcs_${VERSION}_linux_amd64.deb/g" README.md
          sed -i -E "s/apt install \.\/lazygcs_[0-9a-zA-Z.-]+_linux_amd64\.deb/apt install \.\/lazygcs_${VERSION}_linux_amd64.deb/g" README.md
          git add README.md
          if ! git diff-index --quiet HEAD; then
            git commit -m "docs: update manual installation version to v${VERSION}"
            git push origin main
          fi

      - name: Install Cloudsmith CLI
        run: pipx install cloudsmith-cli

      - name: Push Packages to Cloudsmith
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          # Push DEB packages (for Debian/Ubuntu)
          for file in dist/*.deb; do
            [ -f "$file" ] && cloudsmith push deb idan-at/lazygcs/any-distro/any-version "$file"
          done
          
          # Push RPM packages (for Fedora/RedHat)
          for file in dist/*.rpm; do
            [ -f "$file" ] && cloudsmith push rpm idan-at/lazygcs/any-distro/any-version "$file"
          done
          
          # Push APK packages (for Alpine)
          for file in dist/*.apk; do
            [ -f "$file" ] && cloudsmith push alpine idan-at/lazygcs/alpine/any-version "$file"
          done